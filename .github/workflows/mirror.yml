name: Mirror TLE

# Snapshots CelesTrak GP element sets so networks that cannot reach
# celestrak.org can still fetch TLEs (served via raw.githubusercontent.com).
# GitHub's runners reach celestrak.org fine.

on:
  schedule:
    - cron: '17 */8 * * *'   # every 8 hours
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: mirror
  cancel-in-progress: false

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch CelesTrak GP groups
        run: |
          set -euo pipefail
          mkdir -p tle
          groups="active stations starlink oneweb last-30-days visual galileo gps-ops glo-ops science geo iridium-NEXT planet cosmos-2251-debris iridium-33-debris fengyun-1c-debris cosmos-1408-debris"
          ok=0
          for g in $groups; do
            url="https://celestrak.org/NORAD/elements/gp.php?GROUP=${g}&FORMAT=tle"
            if curl -fsS --retry 3 --retry-delay 5 --max-time 60 "$url" -o "tle/${g}.tle.new"; then
              # A valid GP TLE payload has "1 " and "2 " element lines; CelesTrak
              # sometimes serves an HTML error page with HTTP 200.
              if grep -qE '^1 ' "tle/${g}.tle.new" && grep -qE '^2 ' "tle/${g}.tle.new"; then
                mv "tle/${g}.tle.new" "tle/${g}.tle"
                ok=$((ok+1))
                echo "ok: ${g} ($(grep -cE '^1 ' "tle/${g}.tle") objects)"
              else
                echo "::warning::${g} returned a non-TLE payload"
                rm -f "tle/${g}.tle.new"
              fi
            else
              echo "::warning::fetch failed for ${g}"
              rm -f "tle/${g}.tle.new" || true
            fi
          done
          [ "$ok" -gt 0 ] || { echo "::error::no groups fetched"; exit 1; }
          date -u +"%Y-%m-%dT%H:%M:%SZ" > tle/updated.txt
          echo "fetched ${ok} group(s)"

      - name: Fetch full public GP catalog
        run: |
          set -uo pipefail
          # Everything in the public GP catalog in one file — includes rocket
          # bodies and defunct payloads the curated groups above do not cover.
          if curl -fsS --retry 3 --retry-delay 5 --max-time 180 "https://celestrak.org/pub/TLE/catalog.txt" -o tle/catalog.tle.new; then
            if grep -qE '^1 ' tle/catalog.tle.new && grep -qE '^2 ' tle/catalog.tle.new; then
              mv tle/catalog.tle.new tle/catalog.tle
              echo "ok: catalog ($(grep -cE '^1 ' tle/catalog.tle) objects)"
            else
              rm -f tle/catalog.tle.new
              echo "catalog: payload invalid, kept previous copy if any"
            fi
          else
            echo "catalog: unreachable, kept previous copy if any"
          fi

      - name: Fetch McCants classified elements (best effort)
        run: |
          set -uo pipefail
          # NOSS pairs, Lacrosse & friends — objects absent from the public
          # GP catalog. Third-party source; tolerate outages.
          if curl -fsS --retry 2 --max-time 60 "https://www.mmccants.org/tles/classfd.zip" -o /tmp/classfd.zip; then
            if unzip -p /tmp/classfd.zip > tle/classfd.tle.new 2>/dev/null &&
               grep -qE '^1 ' tle/classfd.tle.new && grep -qE '^2 ' tle/classfd.tle.new; then
              mv tle/classfd.tle.new tle/classfd.tle
              echo "ok: classfd ($(grep -cE '^1 ' tle/classfd.tle) objects)"
            else
              rm -f tle/classfd.tle.new
              echo "classfd: payload invalid, kept previous copy if any"
            fi
          else
            echo "classfd: unreachable, kept previous copy if any"
          fi

      - name: Fetch SATCAT (owner/country per satellite)
        run: |
          set -uo pipefail
          if curl -fsS --retry 3 --retry-delay 5 --max-time 120 "https://celestrak.org/pub/satcat.csv" -o tle/satcat.csv.new; then
            if head -1 tle/satcat.csv.new | grep -q "NORAD_CAT_ID"; then
              mv tle/satcat.csv.new tle/satcat.csv
              echo "ok: satcat ($(wc -l < tle/satcat.csv) rows)"
            else
              rm -f tle/satcat.csv.new
              echo "satcat: payload invalid, kept previous copy if any"
            fi
          else
            echo "satcat: unreachable, kept previous copy if any"
          fi

      - name: Commit if changed
        run: |
          git config user.name  "caelo-works"
          git config user.email "291852469+caelo-works@users.noreply.github.com"
          git add tle
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "Update TLE snapshot ($(date -u +%FT%TZ))"
            git push
          fi
