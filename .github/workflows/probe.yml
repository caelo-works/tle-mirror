name: Probe catalog source

# Temporary: locate the current CelesTrak URL for the full GP catalog.

on:
  push:
    branches: [probe]

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Master GP index, catalog mentions
        run: |
          set -uo pipefail
          curl -fsS --max-time 60 "https://celestrak.org/NORAD/elements/master-gp-index.php" -o master.html || echo "master fetch failed: $?"
          grep -io '[^"<>]*catalog[^"<>]*' master.html | sort -u | head -30 || true
          echo "---- hrefs with catalog ----"
          grep -o 'href="[^"]*"' master.html | grep -i catalog | sort -u | head -30 || true

      - name: GP data formats doc, full catalog guidance
        run: |
          set -uo pipefail
          curl -fsS --max-time 60 "https://celestrak.org/NORAD/documentation/gp-data-formats.php" -o doc.html || echo "doc fetch failed: $?"
          grep -io '.\{0,120\}full catalog.\{0,200\}' doc.html | head -20 || true
          echo "---- pub/ links ----"
          grep -o 'href="[^"]*pub[^"]*"' doc.html | sort -u | head -20 || true
          echo "---- catalog.txt mentions ----"
          grep -io '.\{0,100\}catalog\.txt.\{0,150\}' doc.html | head -10 || true
