name: Probe catalog source

# Temporary: locate the current CelesTrak URL for the full GP catalog.

on:
  push:
    branches: [probe]

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: List /pub directory
        run: |
          set -uo pipefail
          code=$(curl -sS -o pub.html -w "%{http_code}" --max-time 60 "https://celestrak.org/pub/") || true
          echo "/pub/ -> HTTP $code, $(wc -c < pub.html) bytes"
          grep -o 'href="[^"]*"' pub.html | sort -u | head -40 || true

      - name: NAME=DEB query
        run: |
          set -uo pipefail
          code=$(curl -sS -o deb.txt -w "%{http_code}" --max-time 120 "https://celestrak.org/NORAD/elements/gp.php?NAME=DEB&FORMAT=tle") || true
          echo "NAME=DEB -> HTTP $code, $(wc -c < deb.txt) bytes, $(grep -cE '^1 ' deb.txt || true) objects"
          head -3 deb.txt

      - name: NAME=R/B query
        run: |
          set -uo pipefail
          code=$(curl -sS -o rb.txt -w "%{http_code}" --max-time 120 "https://celestrak.org/NORAD/elements/gp.php?NAME=R/B&FORMAT=tle") || true
          echo "NAME=R/B -> HTTP $code, $(wc -c < rb.txt) bytes, $(grep -cE '^1 ' rb.txt || true) objects"
          head -3 rb.txt

      - name: NAME=ENVISAT query
        run: |
          set -uo pipefail
          code=$(curl -sS -o env.txt -w "%{http_code}" --max-time 60 "https://celestrak.org/NORAD/elements/gp.php?NAME=ENVISAT&FORMAT=tle") || true
          echo "NAME=ENVISAT -> HTTP $code, $(wc -c < env.txt) bytes, $(grep -cE '^1 ' env.txt || true) objects"
          head -3 env.txt
