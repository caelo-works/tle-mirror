name: Probe catalog source

# Temporary: locate the current CelesTrak URL for the full GP catalog.

on:
  push:
    branches: [probe]

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: INTDES year query
        run: |
          set -uo pipefail
          code=$(curl -sS -o y.txt -w "%{http_code}" --max-time 120 "https://celestrak.org/NORAD/elements/gp.php?INTDES=2002&FORMAT=tle") || true
          echo "INTDES=2002 -> HTTP $code, $(wc -c < y.txt) bytes, $(grep -cE '^1 ' y.txt || true) objects"
          head -3 y.txt
          grep -c ENVISAT y.txt || echo "no ENVISAT"

      - name: SPECIAL=decaying query
        run: |
          set -uo pipefail
          code=$(curl -sS -o d.txt -w "%{http_code}" --max-time 60 "https://celestrak.org/NORAD/elements/gp.php?SPECIAL=decaying&FORMAT=tle") || true
          echo "SPECIAL=decaying -> HTTP $code, $(wc -c < d.txt) bytes, $(grep -cE '^1 ' d.txt || true) objects"

      - name: GROUP=analyst query
        run: |
          set -uo pipefail
          code=$(curl -sS -o a.txt -w "%{http_code}" --max-time 60 "https://celestrak.org/NORAD/elements/gp.php?GROUP=analyst&FORMAT=tle") || true
          echo "GROUP=analyst -> HTTP $code, $(wc -c < a.txt) bytes, $(grep -cE '^1 ' a.txt || true) objects"
